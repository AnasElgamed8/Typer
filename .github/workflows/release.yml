name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Typer ${{ github.ref_name }}'
          releaseBody: |
            ## Typer ${{ github.ref_name }}
            
            A cross-platform typing practice app with adaptive learning and keyboard heatmap.
            
            ### Features
            - Adaptive learning (keybr.com-inspired)
            - Sprint detection with configurable idle timeout
            - Keyboard heatmap with real-time visualization
            - Bongo Cat avatar (custom avatars supported)
            - Catppuccin Mocha dark theme
            
            ### Installation
            - **Windows**: Download the `.msi` or `.exe` installer
            - **macOS**: Download the `.dmg` for your architecture (Apple Silicon or Intel)
            - **Linux**: Download the `.deb`, `.rpm`, or `.AppImage`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
